name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Check out the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 with npm cache for faster installs
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # 3. Install all dependencies (including devDependencies for tests)
      - name: Install dependencies
        run: npm ci

      # 4. Run the full Jest test suite
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          BASE_URL: http://localhost:5000

      # 5. Build the Docker image to verify it compiles cleanly
      - name: Build Docker image
        working-directory: .
        run: docker build -t url-shortener-backend ./backend
